name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  php-lint:
    name: PHP syntax (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: none

      - name: Lint all PHP files
        run: |
          set -e
          find . -name '*.php' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -not -path './.worktrees/*' \
            -print0 | xargs -0 -n1 php -l

  js-lint:
    name: JS syntax
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint all JS files
        run: |
          set -e
          find assets/js -name '*.js' -print0 | xargs -0 -n1 node --check
